name: Build Frontend Prefeitura (Docker)

on:
  push:
    branches:
      - prefeitura

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: prefeitura

      - name: Login no Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
            -u "${{ secrets.DOCKERHUB_USERNAME }}" \
            --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="https://semdor.paranavai.pr.gov.br/back" \
            -t devnardi/web-prefeitura:prefeitura .

      - name: Push Docker image
        run: |
          docker push devnardi/web-prefeitura:prefeitura
