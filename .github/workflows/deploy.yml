name: Deploy Frontend Prefeitura (Docker)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Optional Docker Hub login
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          else
            echo "Skipping Docker Hub login: secrets not set"
          fi

      - name: Pull Docker image
        run: docker pull devnardi/web-prefeitura:latest

      - name: Stop and remove existing container
        run: |
          docker rm -f web-prefeitura || true

      - name: Run container
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: |
          docker run -d \
            --name web-prefeitura \
            --restart unless-stopped \
            -p 3000:3000 \
            -e NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL}" \
            devnardi/web-prefeitura:latest

      - name: Prune unused images
        if: always()
        run: docker image prune -f
