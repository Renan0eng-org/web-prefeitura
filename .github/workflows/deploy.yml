name: Deploy Frontend Prefeitura (Docker)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
            -u "${{ secrets.DOCKERHUB_USERNAME }}" \
            --password-stdin

      - name: Build da imagem
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="https://semdor.paranavai.pr.gov.br/back" \
            -t devnardi/web-prefeitura:latest .

      - name: Push da imagem
        run: |
          docker push devnardi/web-prefeitura:latest

      - name: Remover container antigo
        run: |
          docker rm -f web-prefeitura || true

      - name: Remover imagem local
        run: |
          docker rmi devnardi/web-prefeitura:latest || true

      - name: Baixar imagem atualizada
        run: |
          docker pull devnardi/web-prefeitura:latest

      - name: Subir novo container
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: |
          docker run -d \
            --name web-prefeitura \
            --restart unless-stopped \
            -p 3000:3000 \
            -e NODE_ENV=production \
            -e NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL}" \
            devnardi/web-prefeitura:latest

      - name: Limpar imagens não utilizadas
        if: always()
        run: docker image prune -af