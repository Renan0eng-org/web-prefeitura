version: "3.9"

services:
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: https://semdor.paranavai.pr.gov.br/back

    container_name: web-prefeitura

    ports:
      - "3000:3000"

    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://semdor.paranavai.pr.gov.br/back

    restart: unless-stopped